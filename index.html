<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF MASTER SALES AGENCY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Skrinşotdakı Premium Qara Dizayn */
        :root { --gold: #c5a059; --bg: #0f0f0f; --card: #1a1a1a; }
        
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: white; scroll-behavior: smooth; }

        /* Naviqasiya Barı */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 10%; background: #ffffff; color: #000; 
        }
        .logo-text { font-weight: 800; font-size: 22px; text-transform: uppercase; }
        .logo-text span { color: var(--gold); display: block; font-size: 12px; margin-top: -5px; }
        
        nav a { 
            text-decoration: none; color: #333; margin-left: 25px; 
            font-size: 13px; font-weight: 700; text-transform: uppercase; 
        }

        /* Hero Bölməsi (Tam skrinşotdakı kimi) */
        .hero { 
            height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1200');
            background-size: cover; background-position: center; border-bottom: 3px solid var(--gold);
        }

        .hero-logo-box { 
            background: white; padding: 40px; border-radius: 5px; 
            max-width: 500px; width: 80%; margin-bottom: 30px;
        }
        .hero-logo-box img { width: 100%; }

        .hero h1 { font-size: 38px; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .hero p { font-size: 16px; margin: 10px 0; color: #ccc; }
        .hero-tagline { font-style: italic; color: #eee; margin-top: 20px; font-size: 14px; }

        /* Elanlar Bölməsi */
        .container { padding: 80px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; transition: 0.4s; border: 1px solid #333; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 25px; }
        .price { color: var(--gold); font-size: 26px; font-weight: 800; display: block; margin-bottom: 10px; }
        
        /* Sosial Düymə */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; color: white; 
            font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000;
        }

        footer { background: #000; padding: 40px 10%; text-align: center; border-top: 1px solid #222; }
        .social-icons a { color: white; font-size: 24px; margin: 0 15px; transition: 0.3s; }
        .social-icons a:hover { color: var(--gold); }

    </style>
</head>
<body>

<header>
    <div class="logo-text">RF MASTER <span>SALES AGENCY</span></div>
    <nav>
        <a href="#home">Əsas</a>
        <a href="#listings">Məhsullar</a>
        <a href="#about">Haqqımızda</a>
        <a href="#contact">Bizimlə Sat</a>
    </nav>
</header>

<section class="hero" id="home">
    <div class="hero-logo-box">
        <img src="logo.png" alt="RF Master Logo" onerror="this.src='https://i.ibb.co/L9nZf4v/logo-placeholder.png'">
    </div>
    <h1>RF MASTER SALES AGENCY</h1>
    <p>Sizin satış agentliyiniz</p>
    <p class="hero-tagline">Biz məhsul yox, satış edirik!</p>
</section>

<div class="container" id="listings">
    <h2 style="text-align:center; color:var(--gold); margin-bottom:50px; text-transform:uppercase;">Aktiv Elanlar</h2>
    <div class="grid" id="estate-container">
        </div>
</div>

<a href="https://wa.me/994506667508" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<footer id="contact">
    <div class="social-icons">
        <a href="https://www.instagram.com/rfmaster.agency/"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@rfmaster.agency"><i class="fab fa-tiktok"></i></a>
        <a href="https://wa.me/994506667508"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p style="color: #666; margin-top: 20px;">&copy; 2026 RF Master Sales Agency | By Ramil & Farid</p>
</footer>

<script>
    async function loadContent() {
        const container = document.getElementById('estate-container');
        try {
            const res = await fetch(`https://api.github.com/repos/ramilshirinov/rf-master-sales-agency/contents/content/real-estate`);
            const files = await res.json();
            container.innerHTML = '';
            for (const file of files) {
                if (file.name.endsWith('.md')) {
                    const cRes = await fetch(file.download_url);
                    const text = await cRes.text();
                    const title = text.match(/title:\s*"(.*)"/)?.[1] || "Elan";
                    const price = text.match(/price:\s*"(.*)"/)?.[1] || "Razılaşma";
                    const img = text.match(/image:\s*"(.*)"/)?.[1] || "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=500";
                    
                    container.innerHTML += `
                        <div class="card">
                            <img src="${img}">
                            <div class="card-body">
                                <span class="price">₼ ${price}</span>
                                <h3 style="margin:0; font-size:20px;">${title}</h3>
                                <a href="https://wa.me/994506667508?text=Salam, ${title} ilə maraqlanıram" 
                                   style="display:inline-block; margin-top:15px; color:var(--gold); text-decoration:none; font-weight:bold; border:1px solid var(--gold); padding:8px 15px; border-radius:4px;">
                                   DETALLAR
                                </a>
                            </div>
                        </div>`;
                }
            }
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Hələlik aktiv elan yoxdur.</p>";
        }
    }
    loadContent();
</script>
</body>
</html>
