<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Master Sales Agency</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f9f9f9; color: #333; scroll-behavior: smooth; }
        
        /* Naviqasiya */
        header { background: var(--dark); padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .logo { color: var(--white); font-size: 22px; font-weight: 900; text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--gold); }
        nav a { color: var(--white); text-decoration: none; margin-left: 20px; font-weight: 500; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* Hero */
        .hero { background: var(--dark); color: white; padding: 60px 8%; text-align: center; border-bottom: 5px solid var(--gold); }
        .hero h1 { font-size: 36px; margin-bottom: 10px; }

        /* Filter Menyu (Gələcəkdə bura yeni bölmələr əlavə olunacaq) */
        .category-nav { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .cat-btn { padding: 10px 25px; border: 2px solid var(--gold); background: transparent; color: var(--dark); cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: var(--gold); color: white; }

        /* Grid */
        .container { padding: 0 8% 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--dark); color: var(--gold); padding: 5px 12px; font-size: 12px; border-radius: 5px; font-weight: bold; border: 1px solid var(--gold); }
        .info { padding: 20px; }
        .info h3 { margin: 0 0 10px; font-size: 18px; }
        .info p { color: #777; font-size: 13px; margin-bottom: 15px; }
        .price { font-size: 20px; font-weight: 800; color: var(--dark); }
        .wa-btn { display: block; background: #25D366; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">RF <span>MASTER</span></a>
    <nav>
        <a href="#real-estate">Əmlak</a>
        <a href="https://wa.me/994506667508">Əlaqə</a>
    </nav>
</header>

<section class="hero">
    <h1>RF Master Sales Agency</h1>
    <p>Hər sahədə satışın Master səviyyəsi</p>
</section>

<div class="container">
    <div class="category-nav">
        <button class="cat-btn active">Daşınmaz Əmlak</button>
        </div>

    <div class="grid" id="main-container">
        </div>
</div>

<script>
    const USER = "ramilshirinov";
    const REPO = "rf-master-sales-agency";

    async function loadContent(folder) {
        const container = document.getElementById('main-container');
        container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Yüklənir...</p>";
        
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/content/${folder}`);
            const files = await res.json();
            
            container.innerHTML = '';
            for (const file of files) {
                if (file.name.endsWith('.md')) {
                    const cRes = await fetch(file.download_url);
                    const text = await cRes.text();
                    
                    const title = text.match(/title:\s*"(.*)"/)?.[1] || "Başlıqsız";
                    const price = text.match(/price:\s*"(.*)"/)?.[1] || "Razılaşma";
                    const loc = text.match(/location:\s*"(.*)"/)?.[1] || "Sumqayıt";
                    const img = text.match(/image:\s*"(.*)"/)?.[1] || "logo.png";

                    container.innerHTML += `
                        <div class="card">
                            <span class="badge">ƏMLAK</span>
                            <img src="${img}" alt="${title}">
                            <div class="info">
                                <h3>${title}</h3>
                                <p><i class="fas fa-map-marker-alt"></i> ${loc}</p>
                                <span class="price">₼ ${price}</span>
                                <a href="https://wa.me/994506667508?text=Salam, bu əmlakla bağlı məlumat istəyirəm: ${title}" class="wa-btn">
                                    <i class="fab fa-whatsapp"></i> Maraqlanıram
                                </a>
                            </div>
                        </div>`;
                }
            }
        } catch (e) {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Bu bölmədə hələlik aktiv elan yoxdur.</p>";
        }
    }

    // İlk olaraq Əmlak bölməsini yükləyirik r
    window.onload = () => loadContent('real-estate');
</script>
</body>
</html>
