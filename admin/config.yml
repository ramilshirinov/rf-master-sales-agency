backend:
  name: github
  repo: ramilshirinov/rf-master-sales-agency
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "products"
    label: "Məhsullar"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Məhsulun Adı", name: "title", widget: "string" }
      - { label: "Qiymət (₼)", name: "price", widget: "string" }
      - { label: "Məhsulun Şəkli (Link)", name: "image", widget: "string", default: "https://via.placeholder.com/500" }
      - { label: "Haqqında Məlumat", name: "body", widget: "markdown" }
