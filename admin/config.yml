backend:
  name: github
  repo: ramilshirinov # Bura öz məlumatlarını yaz
  branch: main

media_folder: "images" # Şəkillər bura yüklənəcək
public_folder: "images"

collections:
  - name: "products"
    label: "Məhsullar"
    folder: "content/products" # Elanlar bura fayl kimi düşəcək
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Məhsulun Adı", name: "title", widget: "string" }
      - { label: "Qiymət", name: "price", widget: "string" }
      - { label: "Şəkil", name: "image", widget: "image" }
      - { label: "Məlumat", name: "body", widget: "markdown" }
